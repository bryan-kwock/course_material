<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词拼图 - English Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="upload-panel" class="upload-panel">
        <h2>英语单词拼图</h2>
        <p>请上传包含单词和释义的Excel文件</p>
        <p>格式：第一列为单词，第二列为中文释义</p>
        <div class="upload-area">
            <input type="file" id="excel-file" accept=".xlsx,.xls,.csv">
            <button id="start-custom" class="start-btn">开始学习</button>
        </div>
        <p class="divider">或</p>
        <button id="start-default" class="default-btn">使用默认词库开始</button>
    </div>

    <div id="game-container" class="game-container" style="display: none;">
        <header class="game-header">
            <h1>英语单词拼图</h1>
            <div class="stats">
                <span class="level">关卡: <span id="level">1</span></span>
                <span class="correct">已完成: <span id="completed">0</span>/<span id="total">1</span></span>
            </div>
        </header>

        <main class="game-main">
            <!-- 拼图背景区域 -->
            <div id="puzzle-container" class="puzzle-container">
                <div class="puzzle-background">
                    <img id="background-image" src="" alt="背景">
                </div>
                <div id="puzzle-grid" class="puzzle-grid"></div>
                <div class="hearts-container" id="hearts-container">
                    <span id="hearts">❤️ ❤️ ❤️ ❤️ ❤️</span>
                </div>
            </div>

            <!-- 单词输入区域 -->
            <div class="word-area">
                <div class="meaning">
                    <strong>词义:</strong> <span id="word-meaning"></span>
                </div>
                <div id="letter-inputs" class="letter-inputs"></div>
                <div class="hint">
                    <button id="hint-btn" class="hint-btn">提示 (显示一个字母)</button>
                </div>
            </div>

            <div class="controls">
                <button id="skip-btn" class="skip-btn">跳过这题</button>
                <button id="restart-btn" class="restart-btn">重新开始</button>
            </div>
        </main>
    </div>

        </main>
    </div>

    <script src="words.js"></script>
    <script src="game.js"></script>
</body>
</html>
